version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: nifty_timescaledb
    environment:
      POSTGRES_USER: nifty_user
      POSTGRES_PASSWORD: nifty_pass
      POSTGRES_DB: nifty_db
    ports:
      - '5432:5432'
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  timescaledb_data:
